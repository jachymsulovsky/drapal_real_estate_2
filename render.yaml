services:
  - type: web
    name: drapal-real-estate-2
    runtime: docker
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: drapal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1