services:
  - type: web
    name: drapal-real-estate
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: drapal-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1